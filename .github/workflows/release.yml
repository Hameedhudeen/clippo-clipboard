name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag
        required: true

jobs:
  rust-artifacts:
    name: Rust workspace artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace --release

      - name: Stage Rust artifacts
        shell: bash
        run: |
          mkdir -p dist/release
          find target/release -maxdepth 1 -type f \
            \( -name 'clippo*' -o -name '*.exe' -o -name '*.dll' -o -name '*.dylib' -o -name '*.so' \) \
            -exec cp {} dist/release/ \;

      - name: Generate checksums
        shell: bash
        run: scripts/generate-checksums.sh dist/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clippo-rust-${{ matrix.os }}-${{ inputs.version }}
          path: dist/release/
